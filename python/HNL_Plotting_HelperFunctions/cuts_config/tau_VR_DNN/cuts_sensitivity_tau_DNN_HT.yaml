#cuts to apply to signal for building a cutflow

pass_trigger:
  name: Pass Trigger
  branch: HLT_CscCluster100_PNetTauhPFJet10_Loose
  minVal: 1
  maxVal: 1
  collection: event
  invert: "no"

MET>30GeV:
  name: "MET>30 GeV"
  branch: Puppimet
  minVal: 30
  maxVal: 10000000
  collection: event
  invert: "no"

No_Leptons:
  name: "nLeptons==0"
  branch: nLeptons
  minVal: 0
  maxVal: 0
  collection: event
  invert: "no"


clusterTime:
  name: "-5ns<clusterTime<12.5ns"
  branch: cscRechitClusterTimeWeighted
  minVal: -5
  maxVal: 12.5
  collection: cscCluster
  invert: "no"


cscClusterNoHitsME11/12:
  name: "no hits ME11/12"
  branch: cscRechitClusterNRechitME1112
  minVal: 0
  maxVal: 0
  collection: cscCluster
  invert: "no"

MuonVetoPt<30:
  name: "MuonVetoPt<30GeV"
  branch: cscRechitClusterMuonVetoPt
  minVal: 0
  maxVal: 30
  collection: cscCluster
  invert: "no"

JetVetoPt<10:
  name: "JetVetoPt<10 GeV"
  branch: cscRechitClusterJetVetoPt
  minVal: 0
  maxVal: 10
  collection: cscCluster
  invert: "no"


dPhi(cluster, MET):
  name: "|dPhi(cluster, MET)|<1.5"
  branch: cscRechitClusterPuppiMet_dPhi
  minVal: -1.5
  maxVal: 1.5
  collection: cscCluster
  invert: "no"

has_one_reco_tau:
  name: "exactly 1 tau"
  branch: nTaus
  minVal: 1
  maxVal: 1
  collection: event
  invert: "no"

tau_pt>20GeV:
  name: "tauPt>20GeV"
  branch: tauPt
  minVal: 20
  maxVal: 10000000
  collection: lepton
  invert: "no"

tau_tightID:
  name: tau pass tightID
  branch: tauIsTight
  minVal: 1
  maxVal: 1
  collection: lepton
  invert: "no"

deltaEta_tauCluster:
  name: "|DeltaEta(cluster,tau)|<2"
  branch: cscRechitClusterPromptTauDeltaEta
  minVal: -2
  maxVal: 2
  collection: cscCluster
  invert: "no"

DNN_Score:
  name: "0.96<DNN<0.99"
  branch: cscRechitClusterDNN_bkgMC_plusBeamHalo
  minVal: 0.96
  maxVal: 0.99
  collection: cscCluster
  invert: "no"

HT_Cut:
  name: "HTSoftJetsEtaLargerThan3.139<20"
  branch: HTSoftJetsLargerThan3p139
  minVal: 0
  maxVal: 0
  collection: event
  invert: "no"










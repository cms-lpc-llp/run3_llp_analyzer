#   collection: cscCluster
#   invert: "no"


MuonVetoPt==0:
  name: "no matched muon to cluster"
  branch: cscRechitClusterMuonVetoPt
  minVal: 0
  maxVal: 0
  collection: cscCluster
  invert: "no"

JetVetoPt<10:
  name: "JetVetoPt<10 GeV"
  branch: cscRechitClusterJetVetoPt
  minVal: 0
  maxVal: 10
  collection: cscCluster
  invert: "no"



dPhi(cluster, MET):
  name: "|dPhi(cluster, MET)|<1.5"
  branch: cscRechitClusterPuppiMet_dPhi
  minVal: -1.5
  maxVal: 1.5
  collection: cscCluster
  invert: "no"

# has_one_reco_tau:
#   name: "exactly 1 tau"
#   branch: nTaus
#   minVal: 1
#   maxVal: 1
#   collection: event
#   invert: "no"

mu_pt>26GeV:
  name: "muPt>26GeV"
  branch: lepPt
  minVal: 26
  maxVal: 10000000
  collection: lepton
  invert: "no"

mu_tightID:
  name: mu pass tightID
  branch: lepTightId
  minVal: 1
  maxVal: 1
  collection: lepton
  invert: "no"

mu_passLoosePFIso:
  name: mu pass looseISO
  branch: lepPassLooseIso
  minVal: 1
  maxVal: 1
  collection: lepton
  invert: "no"

deltaEta_muCluster:
  name: "|DeltaEta(cluster,mu)|<2"
  branch: cscRechitClusterPromptMuDeltaEta
  minVal: -2
  maxVal: 2
  collection: cscCluster
  invert: "no"

DNN_Score:
  name: "DNN>0.99975"
  branch: cscRechitClusterDNN_bkgMC_plusBeamHalo
  minVal: 0.99975
  maxVal: 1
  collection: cscCluster
  invert: "no"



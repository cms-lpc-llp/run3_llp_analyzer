#cuts to apply to signal for building a cutflow

pass_single_e_trigger:
  name: Pass Trigger
  branch: HLT_Ele30_WPTight_Gsf
  minVal: 1
  maxVal: 1
  collection: event
  invert: "no"


fail_cross_trigger:
  name: Fail Cross Trigger
  branch: HLT_CscCluster100_Ele5
  minVal: 0
  maxVal: 0
  collection: event
  invert: "no"

at_least_1_cluster:
  name: "nCscClusters>0"
  branch: nCscRechitClusters
  minVal: 1
  maxVal: 100000000
  collection: event
  invert: "no"

ClusterSize>=100:
  name: "NHits>=100"
  branch: cscRechitClusterSize
  minVal: 100
  maxVal: 100000000
  collection: cscCluster
  invert: "no"

clusterTime:
  name: "-5ns<clusterTime<12.5ns"
  branch: cscRechitClusterTimeWeighted
  minVal: -5
  maxVal: 12.5
  collection: cscCluster
  invert: "no"

cscClusterNoHitsME1112:
  name: "no hits ME1112"
  branch: cscRechitClusterNRechitME1112
  minVal: 0
  maxVal: 0
  collection: cscCluster
  invert: "no"

MET>30GeV:
  name: "MET>30 GeV"
  branch: Puppimet
  minVal: 30
  maxVal: 10000000
  collection: event
  invert: "no"

1_Lepton:
  name: "nLeptons==1"
  branch: nLeptons
  minVal: 1
  maxVal: 1
  collection: event
  invert: "no"

1_Lepton_isElectron:
  name: "Lepton is Electron"
  branch: lepPdgId
  minVal: -11
  maxVal: 11
  collection: lepton
  invert: "no"

MuonVetoPt<30:
  name: "MuonVetoPt<30GeV"
  branch: cscRechitClusterMuonVetoPt
  minVal: 0
  maxVal: 30
  collection: cscCluster
  invert: "no"

JetVetoPt<10:
  name: "JetVetoPt<10 GeV"
  branch: cscRechitClusterJetVetoPt
  minVal: 0
  maxVal: 10
  collection: cscCluster
  invert: "no"


ele_pt>30GeV:
  name: "elePt>30GeV"
  branch: lepPt
  minVal: 30
  maxVal: 10000000
  collection: lepton
  invert: "no"

ele_MVAISO80:
  name: ele pass MVAISO80
  branch: lepPassMVAISOWP80
  minVal: 1
  maxVal: 1
  collection: lepton
  invert: "no"

deltaEta_eleCluster:
  name: "|DeltaEta(cluster,ele)|<2"
  branch: cscRechitClusterPromptEleDeltaEta
  minVal: -2
  maxVal: 2
  collection: cscCluster
  invert: "no"

DNN_Score:
  name: "DNN>0.99975"
  branch: cscRechitClusterDNN_bkgMC_plusBeamHalo
  minVal: 0.99975
  maxVal: 1
  collection: cscCluster
  invert: "no"


